<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="aish — Agentic GPU cloud control plane for Claude Code">
  <title>aish — Agentic GPU cloud control plane for Claude Code</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="55%" stop-color="#101521"/>
      <stop offset="100%" stop-color="#0b0d12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5" stroke-opacity="0.6"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <circle cx="940" cy="170" r="220" fill="url(#glow)"/>

  <!-- left mark: stylized GPU/agent glyph -->
  <g transform="translate(80,90)">
    <rect x="0" y="0" width="180" height="180" rx="22" fill="#0f172a" stroke="url(#accent)" stroke-width="1.5"/>
    <g transform="translate(28,28)" stroke="url(#accent)" stroke-width="2" fill="none" stroke-linecap="round">
      <rect x="6" y="6" width="112" height="112" rx="10"/>
      <rect x="22" y="22" width="80" height="80" rx="6" stroke-opacity="0.6"/>
      <circle cx="62" cy="62" r="22" stroke-opacity="0.85"/>
      <circle cx="62" cy="62" r="6" fill="url(#accent)" stroke="none"/>
      <line x1="62" y1="0"  x2="62" y2="6"/>
      <line x1="62" y1="118" x2="62" y2="124"/>
      <line x1="0"  y1="62" x2="6"  y2="62"/>
      <line x1="118" y1="62" x2="124" y2="62"/>
      <line x1="14" y1="14" x2="22" y2="22"/>
      <line x1="102" y1="14" x2="110" y2="22"/>
      <line x1="14" y1="110" x2="22" y2="102"/>
      <line x1="102" y1="110" x2="110" y2="102"/>
    </g>
    <g transform="translate(0,0)" filter="url(#soft)" opacity="0.6">
      <circle cx="90" cy="90" r="56" fill="none" stroke="url(#accent)" stroke-width="0.8"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(310,140)" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace">
    <text x="0" y="0" font-size="124" font-weight="700" fill="url(#accent)" letter-spacing="-4">aish</text>
    <text x="6" y="48" font-size="22" font-weight="500" fill="url(#dim)" letter-spacing="2">AGENTIC&#160;GPU&#160;CONTROL&#160;PLANE</text>
    <text x="6" y="84" font-size="18" font-weight="400" fill="#cbd5e1" opacity="0.85">a Claude Code plugin · TensorDock + Modal MCP · GPU skills · ML subagents</text>
  </g>

  <!-- right: command-line motif -->
  <g transform="translate(800,75)" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-size="14">
    <rect x="0" y="0" width="320" height="210" rx="14" fill="#0a0f1a" stroke="#1f2937" stroke-width="1"/>
    <g transform="translate(14,14)" fill="#475569">
      <circle cx="0" cy="0" r="5" fill="#fb7185"/>
      <circle cx="18" cy="0" r="5" fill="#fbbf24"/>
      <circle cx="36" cy="0" r="5" fill="#34d399"/>
    </g>
    <g transform="translate(20,52)" fill="#94a3b8">
      <text y="0"><tspan fill="#a78bfa">$</tspan> <tspan fill="#e2e8f0">claude</tspan></text>
      <text y="24" fill="#64748b">&gt; /plugin marketplace add lonexreb/aish</text>
      <text y="48" fill="#64748b">&gt; /plugin install aish@aish-marketplace</text>
      <text y="72" fill="#64748b">&gt; deploy an H100 in europe-west and run modal app</text>
      <text y="100" fill="#7dd3fc">aish-tensordock <tspan fill="#475569">·</tspan> aish-modal <tspan fill="#475569">·</tspan> ready</text>
    </g>
  </g>

  <!-- bottom rule -->
  <line x1="80" y1="312" x2="1120" y2="312" stroke="#1f2937" stroke-width="1"/>
  <text x="80" y="338" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="12" fill="#475569">github.com/lonexreb/aish</text>
  <text x="1120" y="338" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="12" fill="#475569">v0.1.0 · MIT · python 3.11+</text>
</svg>
